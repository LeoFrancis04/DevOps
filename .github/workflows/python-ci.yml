name: Basic Python CI Pipeline

on:
  push:
    branches: [ main ]
    # The monorepo magic: only trigger on changes to these paths
    paths:
      - 'Projects/cicd-github-actions/cicd-pipeline-demo-py-app/**'
      - '.github/workflows/python-ci.yml'

jobs:
  # Build and Test job
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
      
    - name: Install dependencies
      run: |
        python -m pip install uv
        uv pip install --system pytest

    - name: Run Tests
      run: |
        cd Projects/cicd-github-actions/cicd-pipeline-demo-py-app
        pytest

  # Deploy job
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test # This ensures tests pass before deploying

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Simulate Deployment to Production
      run: |
        echo "Tests passed successfully!"
        echo "Starting deployment process..."
        echo "Connecting to production server..."
        sleep 2 # Simulating a short delay
        echo "Copying application files..."
        sleep 2
        echo "Restarting application service..."
        echo "Deployment complete! Application is live."