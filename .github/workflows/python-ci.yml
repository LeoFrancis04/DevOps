name: Basic Python CI Pipeline

on:
  push:
    branches: [ main ]
    # The monorepo magic: only trigger on changes to these paths
    paths:
      - 'Projects/cicd-github-actions/cicd-pipeline-demo-py-app/**'
      - '.github/workflows/python-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
      
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: Run Tests
      run: |
        cd Projects/cicd-github-actions/cicd-pipeline-demo-py-app
        pytest